<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول قسم {{ class_name }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="card mx-auto shadow p-4" style="width: 90%; max-width: 380px; border-radius: 15px;">
        <h3 class="text-center text-primary mb-4">قسم {{ class_name }}</h3>
        <form method="POST">
            <input type="text" name="username" class="form-control mb-3" placeholder="اسم المستخدم" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="كلمة السر" required>
            <button class="btn btn-primary w-100 fw-bold py-2">تسجيل الدخول</button>
        </form>
        <hr>
        <p class="text-center mb-0 small">ليس لديك حساب؟ <a href="/register">أنشئ حساباً جديداً</a></p>
    </div>
</body>
</html>
