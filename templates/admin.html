<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الأدمن</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-danger mb-3">
<div class="container">
<span class="navbar-brand">
🛠 لوحة تحكم عبد الحق
</span>
<a href="/logout" class="btn btn-outline-light btn-sm">خروج</a>
</div>
</nav>

<div class="container">

{% for ex in exercises %}
<div class="card p-3 mb-3 shadow-sm" id="card-{{ loop.index0 }}">
<span class="badge bg-primary">{{ ex.subject }}</span>
<p>{{ ex.content }}</p>
<small>👤 {{ ex.author }}</small>
<br>
<button onclick="deleteEx({{ loop.index0 }})" class="btn btn-sm btn-danger mt-2">
حذف
</button>
</div>
{% endfor %}

</div>

<script>
function deleteEx(index){
if(confirm("هل تريد حذف هذا التمرين؟")){
fetch("/delete/"+index)
.then(res=>res.json())
.then(data=>{
if(data.status==="success"){
document.getElementById("card-"+index).remove();
}
});
}
}
</script>

</body>
</html>
