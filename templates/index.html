<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القسم</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-3">
<div class="container">
<span class="navbar-brand small">
🏫 قسم {{ class_name }} | {{ current_user }}
</span>
<a href="/logout" class="btn btn-outline-light btn-sm">خروج</a>
</div>
</nav>

<div class="container">

<form id="exerciseForm" class="row g-2 mb-3">
<div class="col-4">
<select name="subject" class="form-select">
{% for s in subjects %}
<option>{{ s }}</option>
{% endfor %}
</select>
</div>

<div class="col-8">
<input type="text" name="content" class="form-control" placeholder="اكتب التمرين..." required>
</div>

<div class="col-12">
<button class="btn btn-primary w-100">نشر</button>
</div>
</form>

<div id="container" class="row g-3">
{% for ex in exercises %}
<div class="col-12 col-md-6">
<div class="card p-3 shadow-sm">
<span class="badge bg-primary mb-2">{{ ex.subject }}</span>
<p>{{ ex.content }}</p>
<small class="text-muted">👤 {{ ex.author }}</small>
</div>
</div>
{% endfor %}
</div>

</div>

<script>
document.getElementById("exerciseForm").addEventListener("submit",function(e){
e.preventDefault();
let formData=new FormData(this);

fetch("/add",{method:"POST",body:formData})
.then(res=>res.json())
.then(data=>{
if(data.status==="success"){
location.reload();
}
});
});
</script>

</body>
</html>
